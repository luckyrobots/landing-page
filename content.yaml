# ─── jobs.html folds ────────────────────────────────────────────────────────

jobs_page:
  heading: "Work at Lucky Robots"
  intro_p1: >-
    We're Lucky Robots. A small, sharp, fast-moving team building the next
    generation of robotics and AI. Our mission is to make robotics usable and
    affordable for everyone.
  intro_p2: >-
    Instead of spending months debugging robot arms, we're building powerful AI
    simulations using Lucky Engine, MuJoCo, and natural language interfaces
    that let you train robots the way humans learn — by doing.

jobs_aiml:
  heading: "AI/ML Open positions"
  positions:
