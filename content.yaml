# Fold 9: Final CTA (get your robots ready)
final_cta:
  heading: "Get your robots ready for the real world."
  body: >-
    Whether you're building cutting-edge AI, refining autonomous systems, or
    accelerating robotics research, Lucky gives you the synthetic data and
    simulation muscle to move faster — without compromise.
  button_label: "Get Started"
  button_href: "./contact"

