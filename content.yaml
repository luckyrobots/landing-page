# Fold 8: Open positions on index
open_positions:
  heading: "Open positions"
  cta_label: "View All Open Roles"
  cta_href: "./jobs"

jobs_index:
  - { title: "Software Engineer (C++) - Core/Game Engine",                   type: "Full Time", location: "United States",                   url: "./jobs/software-engineer" }
